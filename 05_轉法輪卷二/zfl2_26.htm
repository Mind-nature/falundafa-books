  <p ALIGN="center">  
  <font lang="ZH-CN" size="4"><b>何為智</b></font></p>  
 
  <p class="MsoPlainText">
  　　人類社會中的名人、學者、各類專家，人覺的很偉大，其實都很渺小，因為他們是常人。他們的知識也只是常人社會現代科學所認識的那麼一點點而已。龐大的宇宙，從最宏觀到最微觀，人類社會恰好在最中間、最外層、最表面。生命也是最低的存在形式，所以對物質與精神的認識也是很少的、膚淺而又可憐的。掌握了全人類的知識還是個常人。</p>
