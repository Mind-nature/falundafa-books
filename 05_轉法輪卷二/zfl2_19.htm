  <p ALIGN="center">  
  <font lang="ZH-CN" size="4"><b>悟</b></font></p>  
 
  <p class="MsoPlainText">
  　　人世渾渾，珠目相混。如來下世必悄悄然。傳法時，必有邪門干擾。道魔同傳，同在一世，真真假假重在悟。何以分辨，必有上士。果然有緣能悟者，倆倆相繼而來，入道得法。識正邪，得真經，輕其身，豐其慧，充其心，乘法船悠悠。善哉！奮力精進，直至圓滿。</p>
  <p class="MsoPlainText">
  　　混世難悟之人，為錢而生，為勢而斃，為蠅頭小利而樂而憂，苦苦相鬥，造業一生。其人若聽其法必笑之，口出迷信二字，心中必難解難信，此等人為下士，難度也。業大已封其身，閉其智，本性無存。</p>
