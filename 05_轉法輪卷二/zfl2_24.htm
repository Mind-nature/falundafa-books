  <p ALIGN="center">  
  <font lang="ZH-CN" size="4"><b>堅定</b></font></p>  
 
  <p class="MsoPlainText">
  　　有師在信心十足之，無師在而無興修乎，似為師而修，為興而來，此乃中士之一大弊也。釋迦、耶穌、老子、孔子一去二千有餘，其弟子從未覺師不在而無可修。修乃自身之事，無人可代之，為師者表面只訴其法理。修心斷慾、明慧不惑乃自負。為興而來，心必不堅，入世俗則必忘其本。如不固守其念，一生無得。不知何時再成機緣，難也！</p>
