  <p ALIGN="center">  
  <font lang="ZH-CN" size="4"><b>何為空</b></font></p>  
 
  <p class="MsoPlainText">
  　　何為空，執著無存為真空，非物質空，然而禪宗已法末，無所傳。亂法末世有學者固抓其空理，顛顛狂狂，如悟哲理之本，其祖達摩自說只有六代之法，後無可傳。何不悟之，如曰：都空，無法、無佛、無像、無我、無存，達摩為何物？無法，禪宗之空理為何物？如無佛無像，釋迦牟尼為何者乎？你無名、無像、無我、無存，全是空，吃飯喝水何故之？穿衣何為？挖其眼如何？你那常人之七情六慾又如何執著。如來講空實乃常人之心全無之意，無漏為空之真諦。宇宙本物質所存、所成、所住，如何能空。非如來傳法必短命，理絕無存，羅漢之法非佛法也！悟哉！悟哉！</p>
