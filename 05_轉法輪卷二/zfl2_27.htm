  <p ALIGN="center">  
  <font lang="ZH-CN" size="4"><b>退休再煉</b></font></p>  
 
  <p class="MsoPlainText">
  　　有一部份聽過課而根基又不錯的學員，因工作忙就不煉了，很可惜！如果是一般的常人，我就不多說甚麼了，隨他去好了，但是這部份人是有希望的。人類的道德在一日千里的往下滑著，常人都在隨波逐流，離道越遠越難往回修。其實修煉就是修人的心，尤其在複雜的工作單位環境，正是提高心性的好機會，一旦退下來，其不失去了一個修煉的最好環境嗎？甚麼矛盾都沒有了還修煉甚麼？怎麼提高呢？人的生命是有限的，往往你打算的挺好，可是你知道自己將來剩的時間還來的及嗎？修煉可不是兒戲，比常人中任何一件事情都嚴肅，不是想當然的，一旦失去機會，六道中輪迴何時再得人身！機緣只有一次，放不下的夢幻一過，方知失去的是甚麼。</p>
