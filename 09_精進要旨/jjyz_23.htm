<CENTER><b><FONT size="4">佛法名詞</FONT></b></CENTER>

<p class="MsoPlainText">
　　有些學員過去是佛教中的居士，對佛經中的名詞印象很深，當這些學員一看到我的話中有和佛教雷同的名詞，就認為是同佛教名詞是一個意思。其實不完全一樣，有些漢地佛教的名詞是漢語詞彙，非佛教絕對專詞。</p>
<p class="MsoPlainText">
　　關鍵是這些學員總是放不下佛教中的東西，原因是沒有意識到在思想中佛教的印象還在起作用，對不二法門的認識不夠。其實那種雷同的認識不就是在干擾了嗎？如果曲解了我的話，那你不就修到佛教上去了嗎？<br>
</p>
<P>
