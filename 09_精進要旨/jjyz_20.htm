<CENTER><b><FONT size="4">拜師</FONT></b></CENTER>

<p class="MsoPlainText">
　　大法洪傳，聞者尋之，得者喜之，修者日眾，不計其數。然而自學者多存拜師之念，有不見師面難得真傳之憂，實乃學法不深之故。我洪傳即是普度，學者即為我弟子，不套舊禮規，棄其表面只見人心，如不實修拜師何用乎？實修者不執於求而自得，一切功，一切法盡在書中，通讀大法自會得之。學者自變，反覆通讀已在道中。師必有法身悄然而護，持之以恆，他日必成正果。<br>
</p>
