<CENTER><b><FONT size="4">圓容</FONT></b></CENTER>

<p class="MsoPlainText" align="center">（一）</p>
<p class="MsoPlainText">
　　人在不同的工作環境，存在著不同的殺生問題。生命的平衡也存在著不同的表現形式，作為修煉者首先應放下一切執著，符合常人的社會狀態，也是維護一層法的表現啊。人類的事業都無人去做，那這層的法將無存。</p>
<p class="MsoPlainText" align="center">（二）</p>
<p class="MsoPlainText">
　　生命在法中會自然存亡，宇宙有成、住、壞，人有生、老、病、死，生命的平衡同樣存在著非自然存亡。忍中有捨，而捨盡方為無漏之更高法理。<br>
</p>
