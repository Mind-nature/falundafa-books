<CENTER><b><FONT size="4">不講狂語</FONT></b></CENTER>

<p class="MsoPlainText">
　　最近有一種說法，大家在洪揚大法時，引導一些有緣之士得了法，走上了修煉的路，因此就說成了自己度了人了，曰：我今天度了幾個人、你度了幾個人等等。其實度人的是法，做這件事的只有師父，你們只是引導了有緣人得法，能不能真得度還得看其人能否修圓滿而定。千萬注意：有意無意的話講大了佛都會震驚，不要給自己修煉造成障礙，這方面的口也得修，希望大家明白。<br>
</p>
