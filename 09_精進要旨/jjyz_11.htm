<CENTER><b><FONT size="4">境界</FONT></b></CENTER>

<p class="MsoPlainText">
　　惡者妒嫉心所致，為私、為氣、自謂不公。善者慈悲心常在，無怨、無恨、以苦為樂。覺者執著心無存，靜觀世人，為幻所迷。<br>
</p>
