<CENTER><b><FONT size="4">穹</FONT></b></CENTER>

<p class="MsoPlainText">
　　宇宙之浩瀚　天體之洪大非人所能探知　物質之微非人所能窺測　人體之窮奧非人知其表面一學之渺　生命之龐雜將永遠是人類永恆之迷<br>
</p>
