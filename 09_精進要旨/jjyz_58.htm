<CENTER><b><FONT size="4">變異</FONT></b></CENTER>

<p class="MsoPlainText">
　　神職人員的不正當行為完全違背了貞潔的誓約，使神的囑託變的一錢不值，令人類與神都感到震驚！善良的人們一直把他們當作自己是否獲得拯救僅有的依賴者，失望使人們越來越不相信宗教，最後對神完全失去了信心，從而無所顧及的幹著一切壞事。發展到今天人們完全變成了魔性大發的變異人，使眾神對人完全失去了信心，這就是神為甚麼不再管人了的主要原因之一。<br>
</p>
