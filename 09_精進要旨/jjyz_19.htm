<CENTER><b><FONT size="4">聖者</FONT></b></CENTER>

<p class="MsoPlainText">　　其人賦天命於世間、天上，具厚德而善其心，懷大志而拘小節，博法理可破迷，濟世度人而功自豐。<br>
</p>
