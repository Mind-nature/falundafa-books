<CENTER><b><FONT size="4">無漏</FONT></b></CENTER>

<p class="MsoPlainText">
　　忍中有捨，能捨是修煉的昇華。法有不同的層次，修煉者對法的認識也是自己修到此一層的認識，每個修煉者對法的理解的不同是每個人所在的層次不同。</p>
<p class="MsoPlainText">
　　對於不同層次的修煉者，法對他也存在著不同層次的要求。捨是不執著於常人之心的體現，如果說真能坦然而捨、心不動者，其實已在那一層了。可是修煉就是為了提高，你已經能捨此執著了，那麼為甚麼不把怕執著本身也捨掉呢？捨它個無漏其不是更高的捨嗎？不過修煉者或常人連根本的捨都做不到，也談及此理，那是為執著心不放而找藉口亂法而已。<br>
</p>
