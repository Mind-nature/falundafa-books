<CENTER><b><FONT size="4">修者忌</FONT></b></CENTER>

<p class="MsoPlainText">　　執著於名，乃有為邪法，如名於世間則必口善心魔，惑眾亂法。</p>
<p class="MsoPlainText">　　執著於錢，乃求財假修，壞教、壞法，空度百年並非修佛。</p>
<p class="MsoPlainText">　　執著於色，則與惡者無別，口念經文賊眼相看，與道甚遠，此乃邪惡常人。</p>
<p class="MsoPlainText">　　執著於親情，必為其所累、所纏、所魔，抓其情絲攪擾一生，年歲一過，悔已晚也。<br>
</p>
