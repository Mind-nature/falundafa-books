<CENTER><b><FONT size="4">博大</FONT></b></CENTER>

<p class="MsoPlainText">
　　法輪大法的法理對任何人修煉，包括宗教信仰都是有指導作用的，這是宇宙的理，是從來沒有講過的真法。過去也不允許人知道宇宙的理（佛法），他超越一切常人社會從古到今的學術及倫理。過去宗教中所傳的和人們感受到的只是皮毛和現象。而他博大精深的內涵只有修煉的人在不同的真修層次中才能體悟和展現出來，才能真正看到法是甚麼。</p>
