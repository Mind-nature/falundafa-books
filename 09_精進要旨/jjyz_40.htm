<CENTER><b><FONT size="4">修煉與負責</FONT></b></CENTER>

<p class="MsoPlainText">　　精進實修為的是早日圓滿，一個修煉者就是一個去常人的執著心者，弟子們哪，你們得明白自己在幹甚麼呀！</p>
<p class="MsoPlainText">
　　因為各地輔導站、總站及學會為大法負責，有權更換一切輔導員及分站長，所以有時會根據不同情況替換負責人。因為負責人首先是個修煉者，是來修煉的，不是來當頭目的，所以一定要能上能下，叫當負責人是為修煉，不當負責人同樣修煉，如替換下來的人心裏過不去，那不就是執著心在起作用嗎？這不正是去那顆心的好機會嗎？如此，還是心放不下，正說明換下來是對的，執著於當負責人本身修煉目地就是不純啦，所以我提醒弟子們哪！你們不可能不去此心而圓滿的。<br>
</p>
