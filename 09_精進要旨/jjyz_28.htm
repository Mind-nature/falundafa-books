<CENTER><b><FONT size="4">何為忍</FONT></b></CENTER>

<p class="MsoPlainText">　　忍是提高心性的關鍵。氣恨、委屈、含淚而忍是常人執著於顧慮心之忍，根本就不產生氣恨，不覺委屈才是修煉者之忍。<br>
</p>
