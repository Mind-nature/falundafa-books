<CENTER><b><FONT size="4">明智</FONT></b></CENTER>

<p class="MsoPlainText">
　　當我告訴一部份學員思想過激是一種思想業在起作用時，目前很多學員把自己平時的一切不夠好的念頭都說成是思想業了，這是不對的。你自己甚麼不好的念頭都沒有了，你還修甚麼？！那麼純潔你不就是佛了嗎？這是一種錯誤認識。自己思想中激烈的反應骯髒的念頭，或罵老師、罵大法、罵人等等，排不掉、壓不住，這才是思想業力。但也有一些弱的，可是跟一般的正常思想念頭不一樣，一定要明確。</p>
