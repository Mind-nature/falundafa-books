<CENTER><b><FONT size="4">富而有德</FONT></b></CENTER>

<p class="MsoPlainText">
　　古人云：錢乃身外之物。人人皆知，人人在求。壯者為足慾；仕女為榮華；老者為解後顧；智者為光耀；差吏為此而盡職，云云，故而求之。</p>
<p class="MsoPlainText">
　　有甚者為之爭鬥，強者走險；氣大者為之可行兇；妒嫉者為此氣絕而死。富民乃君臣之道，尚錢而下下之舉。富而無德危害眾生，富而有德眾望所盼，故而富不可不宣德。</p>
<p class="MsoPlainText">
　　德乃生前所積，君、臣、富、貴皆從德而生，無德而不得，失德而散盡。故而謀權求財者必先積其德，吃苦行善可積眾德。為此則必曉因果之事，明此可自束政、民之心，天下富而太平。</p>
