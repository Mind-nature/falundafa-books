<CENTER><b><FONT size="4">糾正</FONT></b></CENTER>

<p class="MsoPlainText">　　目前各地都在把研究會提出的：</p>
<p class="MsoPlainText">　　　　　　精讀大法<br>
　　　　　　真修心性<br>
　　　　　　苦煉動作<br>
　　　　　　　……等</p>
<p class="MsoPlainText">
當作法或我的話等在傳、在學。其實這不是我的話，也沒有更深的內涵，更不是法。精讀之意與我對學法的要求有很大差異。其實關於讀書我在九五年九月九日寫的「學法」中已經講的很明確了，而且精讀之意對於「學法」起了嚴重干擾，今後一定要注意此問題的嚴重性。我已經講過了佛教在印度失傳的原因及教訓，今後如不注意就是亂法的開始。注意：問題出現了不要找責任，要看自己怎麼做的。也不要追其誰寫的，接受教訓，今後注意。<br>
</p>
