<CENTER><b><FONT size="4">取中</FONT></b></CENTER>

<p class="MsoPlainText">
　　為了叫大法弟子在修煉中少走彎路，每當出現帶有普遍性或嚴重問題的時候，我就寫一篇東西及時指出，使弟子明白，使大法少受損失。因為路能不能走正，不只是看弟子修的正不正，大法的整體形式正不正也是關鍵，所以為師的要經常修正出現的偏差。</p>
<p class="MsoPlainText">
　　由於弟子們認識上的差異，有一部份弟子總是從一個極端轉到另一個極端，每當看到我寫的法就偏激去做，從而又帶來新問題。我叫你們轉變人的認識不是叫你們固守人認識大法這一狀態，但也不是無理智而神神叨叨的，是叫你們清醒的認識大法。<br>
</p>
