<CENTER><b><FONT size="4">為何不得見</FONT></b></CENTER>

<p class="MsoPlainText">
　　見可信，不見即不信，此乃下士之見。人在迷中，造業甚多，迷住本性豈能得見。悟在先見在後，修心去業，本性一出方可見也。然而上士可見可不見，憑悟而圓滿。眾者有見有不見，乃層次所定，根基所致。修者多不見因有求於見，此為執著，故而不去不見。多為業力所阻，或環境不適，或修法所定，原因眾多，因人而定。見者，即見有所不清，不清方可悟道。如身臨其境，無所不清，此人開功也，再不可修，其悟無存。<br>
<P>
