<CENTER><b><FONT size="4">再認識</FONT></b></CENTER>

<p class="MsoPlainText">
　　佛性與魔性的問題，我已經講的再明白不過了。其實，你們所過的關，就是在去你們的魔性啊！可是你們一次一次的用各種藉口或用大法掩蓋過去了，心性沒得到提高，機會一次一次的錯過了。</p>
<p class="MsoPlainText">
　　你們知道嗎？只要你是一個修煉的人，無論在任何環境、任何情況下，所遇到的任何麻煩和不高興的事，甚至於為了大法的工作，不管你們認為再好的事、再神聖的事，我都會利用來去你們的執著心，暴露你們的魔性，去掉它。因為你們的提高才是第一重要的。</p>
<p class="MsoPlainText">　　真能這樣提高上來，你們在純淨心態下所做的事才是最好的事，才是最神聖的。<br>
</p>
