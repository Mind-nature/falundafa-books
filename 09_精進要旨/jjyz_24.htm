<CENTER><b><FONT size="4">修內而安外</FONT></b></CENTER>

<p class="MsoPlainText">
　　人不重德，天下大亂不治，人人為近敵活而無樂，活而無樂則生死不怕，老子曰：民不畏死，奈何以死懼之？此乃大威至也。天下太平民之所願，此時若法令滋彰以求安定，則反而成拙。如解此憂，則必修德於天下方可治本，臣若不私而國不腐，民若以修身養德為重，政、民自束其心，則舉國安定，民心所向，江山穩固，而外患自懼之，天下太平也，此為聖人之所為。<br>
</p>
