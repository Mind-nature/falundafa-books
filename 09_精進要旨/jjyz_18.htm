<CENTER><b><FONT size="4">法正</FONT></b></CENTER>

<p class="MsoPlainText">　　人無德，天災人禍。地無德，萬物凋落。天無道，地裂天崩，蒼穹盡空。法正，乾坤正，生機勃勃，天地固，法長存。<br>
</p>
