<CENTER><b><FONT size="4">手抄經文的處理</FONT></b></CENTER>

<p class="MsoPlainText">
　　目前學大法的人越來越多，每星期都在成倍的增加，由於出版部門的書出的不夠，供不應求，所以在一些地區或農村買不到書。有學員問我，手抄的大法書如何處理。我告訴大家，暫時可以把你們學習大法時的手抄《轉法輪》或其他經文，由去農村傳功傳法的人帶去送給農民，同時可以減少他們的經濟負擔。那麼也就要求學員的手抄本字跡要工整，叫文化不高的農民要看的懂，而且手抄本和印刷本同樣有法的威力。<br>
</p>
