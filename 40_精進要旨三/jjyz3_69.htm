<CENTER><b><FONT size="4">評語</FONT></b></CENTER>

<P align="justify">   
　　大法弟子不要用人心做事，法誰也亂不了，起干擾作用的行為只能是自己修煉中的污點。一個修煉的人，無論是長期沒過去的關還是修煉後幹的壞事，都會成為通向最後的大難關，將來你們怎麼辦呢？<br>
<br>  
<div align="right">  
  <table border="0" cellpadding="0" width="50%" style="border-collapse: collapse" bordercolor="#111111" cellspacing="0">  
    <tr>  
      <td width="100%" align="center">李洪志<br>
      二零零九年十一月十三日</td>  
    </tr>  
  </table>  
</div>
　<p>以上是對明慧網二零零九年十一月十四日美國大法弟子文章《大法經文只能用原文原聲　絕對不能用其它錄音——不能以任何藉口亂法、誤己害人》的加註。 </p>
