<CENTER><b><FONT size="4">對學員文章評語</FONT></b></CENTER>

<P align="justify">   
　　揭露惡警壞人，在社會上公布其人的惡行，此做法對於那些沒有理性的惡人起到了極大的震懾作用，同時也是在對當地講清真相中引起民眾對邪惡迫害最直接的揭露與認識，同時也是救度被謊言毒害、欺騙的民眾的一種好辦法。希望大陸全體大法弟子與新學員都來做好此事。<br>
