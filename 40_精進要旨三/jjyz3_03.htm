<CENTER><b><FONT size="4">用正念看問題</FONT></b></CENTER>

<P>   
　　目前大陸大法弟子利用電視向人民講真相是在揭露邪惡的迫害，是在救度被邪惡欺騙所毒害的眾生，是慈悲偉大的舉動。<br>
<br>
　　邪惡的政治流氓集團對大法弟子根本就沒有講過甚麼法律，也不要再因為怕心而否定大法弟子講清真相中的所為。無論邪惡怎麼迫害，等待大法弟子的都是圓滿，等待邪惡生命的只有在地獄中無休止的償還它們對正法與大法弟子的干擾與迫害所幹的一切。<br>
