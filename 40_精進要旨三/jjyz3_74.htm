<CENTER><b><FONT size="4">注意自心生魔</FONT></b></CENTER>

<P align="justify">   
　　明慧網轉來的稿件我抽時間看了前半部份。文章寫的還好，雖然認識有限，有些對法理和宇宙結構認識不準確的地方，口氣也很大，但基點是好的，可以一部份一部份的發。<br>
<br>
　　對於文章的筆名和催稿的聯繫人，口氣很不好，甚麼文章超過《九評》啊，甚麼開悟啦，甚麼引領世界大法弟子超越新的高度啦，甚麼眾神加持創作等說法，要嚴肅指出，不要做點事人心就膨脹的了不得，引領大法弟子進程的只有師父。<br>
<br>
　　還好，文章還是理性的，讓他們把文章的口氣不要那麼大，他們畢竟是個修煉的人。不然做了好事神也看不起。<br>
<br>
