<CENTER><b><FONT size="4">零四年元旦向大法弟子問好</FONT></b></CENTER>

<P align="justify">   
<br>
中國大陸的大法弟子們，<br>
全世界的大法弟子們：<br>
<br>
　　新年好！<P align="justify">   
　　　　滄桑一瞬是時間，<br>
　　　　
正法造就新紀元；<br>
　　　　
悠悠歲月榮與苦，<br>
　　　　
只為此時了洪願。<P align="justify">   
　　為了眾生，為了證實大法，在神的路上精進吧！未來恆古的圓容與你們的榮耀同在！<br>
<br>
