<CENTER><b><FONT size="4">評語</FONT></b></CENTER>

<P align="justify">   
　　我從來不會告訴大法弟子幹這種事，這是自心生魔所致。<br>
<br>

　<p>以上是對明慧網二零一零年九月九日台灣大法弟子文章《跪在師父法像面前擲爻就算請示？》的評語。 </p>
