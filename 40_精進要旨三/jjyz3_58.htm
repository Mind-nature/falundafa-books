<CENTER><b><FONT size="4">問候</FONT></b></CENTER>

<P align="justify">   
全世界大法弟子們：大家好！<br>
中國大陸大法弟子們：過年好！<br>
<br>
　　正法必成，大法弟子必圓滿。天要變，誰能擋的住！宇宙正法，乾坤再造，盡在收尾；大穹從組，突飛猛進，天上地下幾個丑類算甚麼？大法弟子的威德光耀寰宇。神與人等待的、擔心的，都來了。救度你們的眾生、完成你們史前的洪願、兌現你們的誓約吧！<br>
<br>
　　再次問大家過年好。<br>
<br>
