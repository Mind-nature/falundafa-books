<CENTER><b><FONT size="4">新年問候</FONT></b></CENTER>

<P>   
　　全世界大法弟子新年好！<br>
<br>
　　你們從魔難中、在救度世人中、在更加清醒與成熟中又走過了一年。剩下的路，用神的正念正行圓滿你們的史前大願吧！<P align="justify">   
　　　　路漫漫已盡，<br>
　　　　
霧迷迷漸散；<br>
　　　　
正念顯神威，<br>
　　　　
回天不是盼。<br>
<br>
