<CENTER><b><FONT size="4">大法之福</FONT></b></CENTER>

<P>   
　　十年正法，乾坤再造，救度無量眾生於壞滅，開創無量大穹圓容不滅之法理，之無量智慧。此乃眾生之福，眾大法徒之威德。<br>
<br>
　　為師十年傳大法，僅世間定數已大動，歷史定下彗星之災已過，三次大戰已免，九九年天地成住壞滅之憂已不復，法正人間在即。世間眾生將回報大法與大法徒救度之恩。善哉，善哉，善善哉！<br>
<br>
