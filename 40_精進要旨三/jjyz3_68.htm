<CENTER><b><FONT size="4">致巴西法會</FONT></b></CENTER>

<P align="justify">   
巴西法會全體大法弟子：大家好！<br>
<br>
　　大法弟子是各民族得救的希望。要想做好救度眾生的事，首先就得修好自己。多學法才能正念足，學好法才能完成大法弟子的歷史使命。<br>
<br>
　　祝法會圓滿！<br>
<br>
　　祝你們共同提高！<br>
<br>
