<CENTER><b><FONT size="4">去人心</FONT></b></CENTER>

<P align="justify">   
　　此文寫的好，認識的更好。有一些學員就是不重視學法，經常把大法學員中出現的甚麼情況都用常人心來認識，不只是表現在盲目崇拜上，其實這種人心的表現是修煉人與常人的真實體現。也會給自己帶來許多修煉中的麻煩，干擾證實法、與學員之間在法上的互相協調。最突出的是許多學員被迫害的很嚴重也是自己的人心過重、正念不足造成的。解決的辦法是一定要重視學法，認真學法。這部大法能正大穹，能使人修煉圓滿，那為甚麼不珍惜這萬古機緣呢？而且這機緣瞬間即逝呀！<br>
