<CENTER><b><FONT size="4">評語</FONT></b></CENTER>

<P align="justify">   
　　總是有一些混事、搞事的，在干擾學員。不管你是誰，實實在在的修，全力的講真相，給大家幹出樣子來。為甚麼總是我怎麼怎麼的，那是修嗎？那就是在學員中起干擾作用。<br>
<br>

　<p>以上是對明慧網二零零八年二月二十一日文章《學好法　走出干擾》的評語。 </p>
