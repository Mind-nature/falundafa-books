<CENTER><b><FONT size="4">對學員文章評語</FONT></b></CENTER>

<P align="justify">   
　　此文非常好，對大法弟子證實法的目地非常清醒，正念強，理性清楚。希望中國大陸的大法弟子都看一看此文。大法弟子是在證實大法，對於惡黨的會議後果是不應執著，因為人類社會的一切都是為大法而存在，是為大法弟子修煉而存在。無論是正的還是邪的，它們只能根據大法的需要而動。<br>
