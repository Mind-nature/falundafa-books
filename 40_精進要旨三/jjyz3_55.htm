<CENTER><b><FONT size="4">致歐洲法會</FONT></b></CENTER>

<P align="justify">   
參加歐洲法會的大法弟子：大家好！<br>
<br>
　　大法弟子的修煉不只是為了個人的圓滿，救度眾生是大法弟子的責任，是作為大法弟子稱號的修煉者必須完成的。希望通過法會總結經驗，更好的為完成大法弟子的誓願與責任，做的更好。<br>
<br>
　　最後，祝法會圓滿成功。<br>
<br>
