<CENTER><b><FONT size="4">問候</FONT></b></CENTER>

<P align="justify">   
參加澳洲法會的大法弟子：大家好！<br>
<br>
　　澳洲的大法弟子在證實法、講清真相救度眾生中做的越來越好。希望你們通過這次法會總結好的經驗，找出不足，在以後不多的時間中做的更好。<br>
<br>
　　祝法會圓滿成功！<br>
