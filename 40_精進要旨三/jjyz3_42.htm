<CENTER><b><FONT size="4">賀詞</FONT></b></CENTER>

<P align="justify">   
參加亞特蘭大法會的大法弟子：大家好！<br>
<br>
　　首先預祝大會圓滿成功。希望法會中大家都能有收穫，走好以後的路。<br>
<br>
　　大法弟子，你們是濁世的金光、世人的希望、助師的法徒、未來的法王。精進吧，世中的覺者，現在的一切就是未來的輝煌！<br>
<br>
