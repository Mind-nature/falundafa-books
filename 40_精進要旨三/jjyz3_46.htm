<CENTER><b><FONT size="4">芝加哥法會</FONT></b></CENTER>

<P align="justify">   
參加芝加哥法會的全體大法弟子：大家好！<br>
<br>
　　首先祝法會圓滿功成。<br>
<br>
　　大法弟子的法會是互相提高的法會，是能找出差距的法會，是走向圓滿路上增強正念的法會。成績是學好法充實正念的威德，不足是修煉中要走的路。修煉中無論你們遇到好事與不好的事，都是好事，因為那是你們修煉了才出現的。修煉者不能帶著人心、帶著業債、帶著執著圓滿。時間會使金子越磨越亮。大法弟子正念正行中成就著神的一切，也在開創著宇宙的未來。<br>
<br>
　　精進吧，大法弟子！<br>
<br>
