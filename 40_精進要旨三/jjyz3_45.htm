<CENTER><b><FONT size="4">烏克蘭法會</FONT></b></CENTER>

<P align="justify">   
參加烏克蘭法會的大法弟子：大家好！<br>
<br>
　　首先祝法會開的成功。正法時期大法弟子的圓滿是大法造就新宇宙的大覺者，責任也就更大。在你們的修煉進程中，自然就容匯了救度眾生、解體邪惡與舊因素干擾的使命。只有修好自己才能成就未來的一切，所以希望你們的法會，是一個真正能夠促進學法、提高的盛會。<br>
<br>
　　精進吧，大法弟子！修煉中去人心雖苦，道路是神聖的。<br>
<br>
　　再一次祝你們的法會成功！<br>
<br>
