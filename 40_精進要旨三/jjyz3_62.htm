<CENTER><b><FONT size="4">再一次祝歐洲法會圓滿成功</FONT></b></CENTER>

<P align="justify">   
參加歐洲法會的大法弟子：<br>
<br>
　　大家好！希望你們能從法會中有所收穫，有所提高，在講真相、救度眾生中找出不足，以後做的更好。也希望一直不太精進的學員能找出差距，走出來，完成你們的歷史使命。時間不等人哪！<br>
<br>
　　再一次祝願你們。<br>
<br>
