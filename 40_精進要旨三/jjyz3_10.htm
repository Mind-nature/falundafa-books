<CENTER><b><FONT size="4">對學員文章評語</FONT></b></CENTER>

<P align="justify">   
　　此文思想清晰，對師父正法與大法弟子證實法認識非常明確。如果大法弟子都能這樣理智、頭腦清晰、在證實法中正念正行，迫害就不會存在，邪惡也就無空可鑽了。文章是誰寫的我不看重，反映出來的東西只要對學員證實法有力，我就給予鼓勵，甚至是反對者的文章也沒關係。因為救度的就是所有眾生，迫害沒結束、大法學員修煉的路沒走完，就是機會、就是人的希望。<br>
