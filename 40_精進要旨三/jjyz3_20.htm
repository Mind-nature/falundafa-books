<CENTER><b><FONT size="4">致加拿大蒙特利爾法會</FONT></b></CENTER>

<P align="justify">   
　　大家好！經過幾年來大法弟子不斷的努力，講清真相中使世人越來越清醒了，救度了越來越多的眾生，同時也在成就著大法弟子的未來。可喜可賀。<br>
<br>
　　我們的法會就是在不斷的總結。在證實法中、在大法弟子修煉方式實踐中，還存在著不足。發揚好的經驗，加強正念，使大法弟子的事做的更好。<br>
<br>
　　這次法會也是大法弟子的盛會，也是樹立大法弟子威德的體現。不要放鬆，在最後時刻讓我們做的更好。祝你們圓滿成功！<br>
<br>
