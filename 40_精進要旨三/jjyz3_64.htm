<CENTER><b><FONT size="4">賀詞</FONT></b></CENTER>

<P align="justify">   
參加加拿大法會的大法弟子：大家好！<br>
<br>
　　堅定的走好最後的路，學好法，在修好自己的基礎上，正念自然就會強，大法弟子應該做的事就一定會做好。邪惡完了，環境變了，更不要放鬆自己的修煉，在救度眾生的神聖使命中鑄就你們的威德與輝煌吧！<br>
<br>
