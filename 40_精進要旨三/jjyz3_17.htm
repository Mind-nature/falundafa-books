<CENTER><b><FONT size="4">修改</FONT></b></CENTER>

<P align="justify">   
給明慧網：<br>
<br>
　　今後所有大法書中「目的」的「的」都改回「目地」的「地」，這個「的」在法的內涵中與「地」完全不同，這是現代人否定中國古文化內涵造成的。<br>
<br>
　　還有如「非常地」、「真正地」、「立體地」等這種「地」的用法也改變了內涵，應該改為「的」才對，不是指目地地點與地方的意思都要用「的」為好。<br>
<br>
　　再就是「前&#36827;」的「&#36827;」，這是向井裏走的意思，所以還是改回繁體的「進」為好，越走越佳嘛！<br>
<br>
　　原來的大法書，大法弟子可以改過來。用小刀刮掉後，用手寫或鉛字印上都可以，但是最好是大法弟子來改。<br>
<br>
