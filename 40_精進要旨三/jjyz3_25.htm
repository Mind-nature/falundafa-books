<CENTER><b><FONT size="4">問候</FONT></b></CENTER>

<P align="justify">   
　　謝謝大陸及全世界各民族大法弟子的中秋問候與掛念，為此師父告訴大家幾句話：大法弟子走的是神的路，不要受常人社會形勢變動的影響，抓緊時間講真相、救度世人、清除爛鬼，正念正行。特別是中國大陸大法弟子，要加大力度做好各自該做的事，精進不停。<br>
<br>
　　祝大家中秋添正念！<br>
