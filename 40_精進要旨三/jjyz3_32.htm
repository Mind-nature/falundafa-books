<CENTER><b><FONT size="4">學好法　去人心並不難</FONT></b></CENTER>

<P align="justify">   
　　此文寫的很好。那些對大法弟子證實法救度眾生的方式還不清醒的學員，最好看一看此文。此文雖沒有寫的更全面，深度有限，但是對大法弟子證實法救度眾生所做的一切是清楚的。<br>
<br>
　　其實那些走不出來的，無論是這樣的藉口還是那樣的藉口，都是在掩蓋怕心。可是有沒有怕心，卻是修煉者人神之分的見證，是修煉者與常人的區別，是修煉者一定要面對的，也是修煉者要去掉的最大的人心。<br>
<br>
