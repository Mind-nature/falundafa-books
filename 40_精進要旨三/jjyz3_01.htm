<CENTER><b><FONT size="4">致紐約法會的賀詞</FONT></b></CENTER>

<p class="MsoPlainText" style="text-align:justify;">
紐約法會：大家好！<br>
<br>
　　首先祝法會成功！<br>
<br>
　　歷史賦予大法弟子的是最偉大的一切。目前你們所做的一切都是最神聖的，你們所做的一切都是為了眾生，你們所做的一切就是在創造未來。<br>
<br>
　　在歷史的過去，你們創造了人類應有的輝煌；歷史的今天，大法賦予你們救度眾生的使命；歷史的將來，你們純正的一切就是大穹成住不破的保證。走好你們的路，得救的生命將是你們的眾生，你們所做的一切就是成就你們圓滿的一切。</p>
