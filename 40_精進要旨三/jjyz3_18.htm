<CENTER><b><FONT size="4">清醒</FONT></b></CENTER>

<P align="justify">   
　　作為學員，你不按照師父的要求做，一定不是個簡單的事情。舊勢力對所有的大法弟子都安排了一套它們的東西，如果大法弟子不按照師父的要求做，就一定是在按照舊勢力的安排在做。舊勢力實質上就是針對正法中大法弟子能否走出來、又時時伴隨你們的巨關巨難。<br>
<br>
　　經過這場魔難，有的學員還不清醒，你就將錯過這一切。按照師父的要求做才是大法弟子在證實法、在修煉自己，才是真正的大法弟子。<br>
<br>
