<CENTER><b><FONT size="4">講真相的根本目地</FONT></b></CENTER>

<P align="justify">   
　　法輪大法是佛法。在中共邪惡的宣傳中把造謠抹黑法輪功的謊言灌輸給了世人，叫世人仇恨佛法、仇恨走在神的路上的大法弟子。特別是中國人在談話中、在面對大法弟子時表現的態度，是站在邪惡立場的。如果是這樣，那世人不危險嗎？也就是說，這場迫害無論怎樣邪惡，大法弟子是在邪惡的考驗中走向圓滿，而真正危險的是被邪黨灌輸了謊言的世人。共產黨的出現與中共的真正目地是叫人仇視神佛、宣揚無神論思想、灌輸鬥爭哲學，從而毀掉人類。這就是為甚麼大法弟子要講真相，目地是解除邪惡的謊言，看清共產黨的真面目，清除人對神佛犯下的罪惡，從而救度世人。<br>
