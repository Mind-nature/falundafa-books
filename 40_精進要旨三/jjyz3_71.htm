<CENTER><b><FONT size="4">致印度首屆法會</FONT></b></CENTER>

<P align="justify">   
參加印度首屆法會的大法弟子：你們好！<br>
<br>
　　希望印度大法弟子與其他民族大法弟子一樣，學好法、多學法、經常學法，成為真正的大法修煉人，負擔起洪揚大法與救度眾生的責任。<br>
<br>
　　祝你們法會圓滿成功！<br>
<br>
