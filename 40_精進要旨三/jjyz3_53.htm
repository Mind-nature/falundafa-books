<CENTER><b><FONT size="4">致加拿大法會</FONT></b></CENTER>

<P align="justify">   
參加加拿大法會的大法弟子：大家好！<br>
<br>
　　正法形勢進展很快，大法弟子證實大法與救度眾生的正念也在大量的解體著一切起不好作用的亂神、爛鬼，從而使世間的形勢發生了根本的變化。但是看到大勢已去的邪惡因素與邪黨、邪靈也在做最後的掙扎，因此大法弟子更要做好講真相、救世人與眾生的事。越到最後越不能放鬆，越到最後越要學好法，越到最後正念要越足。<br>
<br>
　　把法會開成共同提高的盛會！祝法會圓滿成功！<br>
<br>
