<CENTER><b><FONT size="4">致二零零五年歐洲法會</FONT></b></CENTER>

<P align="justify">   
與會的全體大法弟子：大家好！<br>
<br>
　　大陸大法弟子在經歷五年多的迫害中，歐洲大法弟子與全世界大法弟子在揭露迫害、講清真相、救度眾生中，做了大法弟子應該做的。由於大法弟子們的共同努力，真相已大白於天下，邪惡也將無處躲藏。這充份體現了正法正信的大法弟子的偉大。<br>
<br>
　　大家繼續努力吧！人類的歷史不是為了當人為最終目地的，人類的歷史也不是給邪惡逞兇的樂園。人類的歷史是為正法而建造的，大法弟子才配在這裏展現輝煌。<br>
<br>
　　再一次祝願大法弟子的法會成功！<br>
<br>
