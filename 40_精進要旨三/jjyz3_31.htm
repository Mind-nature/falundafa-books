<CENTER><b><FONT size="4">致歐洲斯德哥爾摩法會</FONT></b></CENTER>

<P align="justify">   
歐洲法會：<br>
<br>
　　大法弟子好。<br>
<br>
　　世上的一切都是為正法開創的，大法弟子就是當今的風流人物，從古到今各界眾生都在期盼。收救你們要度的眾生吧。正念正行，解體一切障礙，廣傳真相，神在人中。<br>
<br>
　　祝法會成功。<br>
<br>
