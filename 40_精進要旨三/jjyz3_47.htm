<CENTER><b><FONT size="4">徹底解體邪惡</FONT></b></CENTER>

<P align="justify">   
　　大法弟子的證實法與救度世人的正念已經使起負面作用與迫害大法弟子的邪惡生命與因素處於完全解體中。目前只有少數邪惡的爛鬼被舊勢力集中在勞教所、監獄等參與迫害大法弟子的黑窩內，因此，使邪惡的迫害還在局部地方嚴重存在。為了徹底清除黑手、爛鬼與舊勢力對大法弟子的迫害，全世界大法弟子，特別是中國大陸各地區的大法弟子，要向這些邪惡的地方集中發強大的正念，徹底解體一切迫害大法弟子的邪惡生命與因素，清除中國大陸迫害大法弟子的邪惡形勢，救度世人，圓滿大法弟子的責任，走向神。<br>
