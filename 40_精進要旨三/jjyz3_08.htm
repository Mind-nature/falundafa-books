<CENTER><b><FONT size="4">零三年向大法弟子問好</FONT></b></CENTER>

<P align="justify">   
　　中國大陸大法弟子新年好！<br>
　　全世界大法弟子新年好！<P align="justify">   
　　　　　　   
<b>下 塵</b><br>
<br>
　　　　
法輪轉時必有狂<br>
　　　　
國力傾盡為吾忙<br>
　　　　
靜觀丑角妖戲盡<br>
　　　　
只剩殘土風中揚<br>
　　　　
輪迴五千雲和雨<br>
　　　　
撣去封塵看短長<br>
　　　　
大戲誰是風流主<br>
　　　　
只為眾生來一場<br>
<br>
