<CENTER><b><FONT size="4">謝謝眾生的問候</FONT></b></CENTER>

<P align="justify">   
大法弟子、世人、眾生：你們好！<br>
<br>
　　謝謝你們的問候！謝謝你們的祝福！真心希望我的大法弟子都能圓滿！真心希望世人都明真相、認清歷史定給人類最大的惡魔、邪黨對中國人對全世界的毒害、對大法弟子的迫害，走出這歷史上眾生最大的「劫」，真心希望眾生都能得救！<br>
<br>
　　眾生啊！你們幾千年來希望的、等待的和你們擔心的都來了，而且正在發生著，從中人人都在自覺和不自覺的選擇著自己的未來。<br>
<br>
　　告訴你們：大法弟子是各地區、各民族眾生得救的唯一的希望。珍惜他們所做的，就是珍惜你們自己！<br>
<br>
　　再一次謝謝你們的問候！<br>
<br>
