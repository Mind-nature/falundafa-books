<CENTER><b><FONT size="4">評語</FONT></b></CENTER>

<P>   
　　此意見非常好。如果所有的華人學員都能在平時的行為中注意一些、整潔一些，做甚麼事情都要考慮別人，才是大法弟子的風範。為師的傳法這麼多年，也一直本著對社會負責、對人負責的態度而行。<br>
<br>
　　所有參加中使領館前靜坐的大法弟子們了不起呀，大家辛苦了。天太熱，大家保重啊。<br>
<br>

　<p>以上是對明慧網二零零二年六月二十一日《參加中使領館前靜坐請願學員的一些討論意見》一文的評語。 </p>
