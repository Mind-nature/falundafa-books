<CENTER><b><FONT size="4">致歐洲維也納法會</FONT></b></CENTER>

<P align="justify">   
歐洲維也納法會：<br>
<br>
　　大家好！<br>
<br>
　　我們要把法會開成一個總結經驗、找出不足、發揚好的成果、樹立大法弟子正念的盛會。珍惜你們所做的一切，把今後的路走的更好。<br>
<br>
　　師父看著你們，永遠等待你們的好消息。<br>
<br>
　　最後，祝法會圓滿成功！<br>
<br>
