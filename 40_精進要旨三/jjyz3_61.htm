<CENTER><b><FONT size="4">說明</FONT></b></CENTER>

<P align="justify">   
　　大法弟子目前就是做好三件事，人權是人追求的願望，修煉人是以出世間為目地，大法弟子的反迫害是表面形式，實質是在救人、救眾生。「人權聖火」有反迫害的內容，有叫人認識邪黨的作用，但代替不了講真相救人。「人權聖火」是以常人為主的揭露、抵制邪黨迫害中國人而發起的，因此不要以大法弟子為傳遞對像。中國大陸大法弟子不要放下講真相的事大量參與。<br>
