<CENTER><b><FONT size="4">心自明</FONT></b></CENTER>

<p class="MsoPlainText" align="center" style="text-align:center">法度眾生師導航<br>
一帆升起億帆揚<br>
放下執著輕舟快<br>
人心凡重難過洋<br>
風雲突變天欲墜<br>
排山搗海翻惡浪<br>
堅修大法緊隨師<br>
執著太重迷方向<br>
船翻帆斷逃命去<br>
泥沙淘盡顯金光<br>
生死非是說大話<br>
能行不行見真相<br>
待到它日圓滿時<br>
真相大顯天下茫</p>
