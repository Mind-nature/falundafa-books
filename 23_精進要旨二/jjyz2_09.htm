<CENTER><b><FONT size="4">致台灣法會</FONT></b></CENTER>

<p class="MsoPlainText">首先向全體台灣大法學員問候：大家好！</p>
<p class="MsoPlainText">　　同時祝願你們的法會圓滿成功！</p>
<p class="MsoPlainText">　　希望大家通過這次法會都能找到不足，更加精進，把法會開成一個比學、比修、向世人展現正法的聖會。</p>
