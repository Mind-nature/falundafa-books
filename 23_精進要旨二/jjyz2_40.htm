<CENTER><b><FONT size="4">也三言兩語</FONT></b></CENTER>

<p class="MsoPlainText">
　　「好人」一文話不多說明了一個理。對宇宙真理堅不可摧的正念是構成善良的大法弟子堅如磐石的金剛之體，令一切邪惡膽寒，放射出的真理之光令一切生命不正的思想因素解體。有多強的正念，有多大的威力。大法弟子們真的是在從常人中走出來。</p>
