<CENTER><b><FONT size="4">安定</FONT></b></CENTER>

<p class="MsoPlainText">
　　關於前一段所發生的事情對法輪大法廣大學員已經造成了重大傷害，同時也嚴重的敗壞了國家形象。學員可根據所掌握的有關地區、有關部門，直接或變相干擾破壞法輪功學員煉功之事，以至有些人利用手中權力挑起法輪功事件，把廣大人民與政府對立起來，從中撈取政治資本的情況，可通過正常渠道向各級政府或國家領導人反映。</p>
<p class="MsoPlainText">
　　但是我們是修煉的人，不要參與政治，不要受前一段事情的干擾，靜下心來，恢復正常煉功、學法，精進實修，不斷提高自己。</p>
