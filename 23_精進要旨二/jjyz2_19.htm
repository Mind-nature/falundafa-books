<CENTER><b><FONT size="4">賀詞</FONT></b></CENTER>

<p class="MsoPlainText">法輪大法香港法會負責人：</p>
<p class="MsoPlainText">　　師父祝法會圓滿成功！同時感謝給予我們成功舉辦這次法會支持和提供條件的香港政府及人民。</p>
<p class="MsoPlainText">　　為了報答香港政界及人民的支持，我們一定把法輪大法的美好傳給香港人民。</p>
<p class="MsoPlainText">　　希望我們的法會越辦越好。在被迫害中，要讓世人認清真相叫更多的人得法，救度世人。</p>
