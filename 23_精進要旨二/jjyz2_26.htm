<CENTER><b><FONT size="4">弟子的偉大</FONT></b></CENTER>

<p class="MsoPlainText">
　　大法弟子是偉大的，因為你們修的是宇宙的根本大法，因為你們用正念證實了大法，因為你們在巨難中沒有倒下。大法弟子正法，歷史上從沒有過先例。在用理智去證實法、用智慧講清真相、用慈悲去洪法與救度世人的偉大壯舉中，完善著每一個大法弟子圓滿的路。在歷史的偉大時刻，穩健的每一步都是光輝的歷史見證與無比偉大的威德。這一切都將在宇宙歷史中記載。偉大的法、偉大的時代在造就著最偉大的覺者。</p>
