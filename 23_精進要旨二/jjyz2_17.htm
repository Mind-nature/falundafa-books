<CENTER><b><FONT size="4">窒息邪惡</FONT></b></CENTER>

<p class="MsoPlainText">
　　中國的勞動教養所是邪惡勢力的黑窩，那裏的管教人員絕大多數都是地獄的小鬼轉世，所謂被轉化的人，歷史上就是這樣被安排迫害法的。不論他過去被抓被打表現的如何好，都是為了他今天跳出來迫害法、迷惑學員做準備的。希望學員不要聽信他們邪惡的謊言。這也是我有意叫他們暴露出來，叫大家認清他們，從弟子中清除這些隱藏的毒瘤。所有今天為證實大法講清真相的學員做的非常好，我對這個是做了充份肯定的，他們做的是絕對的對，這是無疑義的。希望大家清醒。</p>
