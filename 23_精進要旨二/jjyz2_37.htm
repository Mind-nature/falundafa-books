<CENTER><b><FONT size="4">評「大法的威嚴」</FONT></b></CENTER>

<p class="MsoPlainText">
　　此弟子在「大法的威嚴」一文中談的非常好，這就是正法與個人修煉的不同，同時也體現了在個人修煉中堅實的基礎。沒有大法弟子的善就不是修煉人，大法弟子不能證實法就不是大法弟子。在揭露邪惡時也是在挽救眾生、圓滿自己的世界。</p>
