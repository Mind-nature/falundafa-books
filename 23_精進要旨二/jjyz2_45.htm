<CENTER><b><FONT size="4">法正人間預</FONT></b></CENTER>

<p class="MsoPlainText">
　　正法行於世間，神佛大顯，亂世冤緣皆得善解。對大法行惡者下無生之門，餘者人心歸正、重德行善、萬物更新，眾生無不敬大法救度之恩，普天同慶、同祝、同頌。大法在世間全盛之時始於此時。</p>
