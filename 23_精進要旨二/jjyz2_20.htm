<CENTER><b><FONT size="4">致佛羅里達法會</FONT></b></CENTER>

<p class="MsoPlainText">佛羅里達法會負責人：</p>
<p class="MsoPlainText">
　　你們好！佛羅里達法會是第一個大型用英文召開的法會，這非常好。希望這次法會辦的成功。通過交流心得，真正使大家提高；同時表現出大法的真實面貌，叫更多的人了解大法的真相，從而使有緣人得法。</p>
<p class="MsoPlainText">　　再一次祝大法法會圓滿成功！</p>
