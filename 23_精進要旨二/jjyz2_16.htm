<CENTER><b><FONT size="4">評註一</FONT></b></CENTER>

<p class="MsoPlainText">
　　認識的非常好。在對於思想業力的反映上和邪惡勢力給我們所製造的破壞，我們向人講清真相，都是在採取主動清除魔而不是縱容和消極承受，但思想和行為一定要用善的。</p>
