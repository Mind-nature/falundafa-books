<CENTER><b><FONT size="4">位置</FONT></b></CENTER>

<p class="MsoPlainText">
　　一個修煉的人所經歷的考驗是常人無法承受的，所以在歷史上能修成圓滿的才寥寥無幾。人就是人，關鍵時刻是很難放下人的觀念的，但卻總要找一些藉口來說服自己。然而一個偉大的修煉者就是能在重大考驗中，放下自我，以至一切常人的思想。我為在能否圓滿的考驗中走過來的大法修煉者祝賀。你們生命不滅的永遠以至未來所在的層次，那是你們自己開創的，威德是你們自己修出來的。精進吧，這是最偉大，最殊勝的。</p>
