<CENTER><b><FONT size="4">致俄羅斯第二期大法法會</FONT></b></CENTER>

<p class="MsoPlainText">俄羅斯第二期大法法會：</p>
<p class="MsoPlainText">
　　在正法時期，學員做的都非常好。特別是俄羅斯學員，在俄羅斯人民受中國邪惡政治集團宣傳的嚴重影響下，學員們頂著各種壓力建立了佛學會，在講清真相中起到極大的作用。這都是了不起的。希望通過這次法會，把講清真相、揭露邪惡、救度眾生的工作開展的更好。要經常與國外其它地區學員溝通，互相鼓勵，共同精進。師父等待著你們的更好消息。</p>
