<CENTER><b><FONT size="4">昭示</FONT></b></CENTER>

<p class="MsoPlainText">各地大法學會：</p>
<p class="MsoPlainText">
　　用和平方式向中國政府申訴我們的真實情況、這絕對沒有錯、但是作為修煉的人我們也絕不採取任何過激的行為與言論，一年來大家本著善心向世人、向政府、講明真相與善意申訴中，做的都很正。</p>
<p class="MsoPlainText">
　　我為大法修煉出的弟子們（偉大的生命）而感到高興，我也希望在今後的講清真相與向政府申訴的同時千萬別忽視學法的重要、因為他們都要走向圓滿的。我在關注著學員所做的一切和修煉情況，希望大家做的更好。</p>
