<CENTER><b><FONT size="4">秋風涼</FONT></b></CENTER>

<p class="MsoPlainText" align="center">邪惡之徒慢猖狂，<br>
天地復明下沸湯；<br>
拳腳難使人心動，<br>
狂風引來秋更涼。</p>
