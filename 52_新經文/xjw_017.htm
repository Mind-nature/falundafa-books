                  <div class="jingwenBody"><p style="line-height:162%">參加法會的大法弟子大家好！<p>　　舊勢力用火與血建立起來的邪惡沒想叫大法走出來。你們憑著堅定的信念，憑著來世的神聖誓約，憑著生生世世親緣，憑著對大法理性的認識，同時憑著大法給予你們的正念與法力的根本保障，你們走過來了！<br>　　大家把剩下的事做好，用你無悔的修煉過程走向未來。祝你們會有所悟、會有所成！<p><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師 李洪志<br>二零一九年七月二十一日</td></tr></table></div><p></p><p><br><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2019/7/21/jw190721-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2019/7/21/jw190721-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2019/7/21/jw190721-big5.zip><font color=#0000ff>PDF文件</font></a></div>
