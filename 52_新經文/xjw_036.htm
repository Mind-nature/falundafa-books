                  <div class="jingwenBody">參加法會的大法弟子大家好：<p>　　當今的世人多是下世等法的高層生命，等待創世主再造新天體時得救度，做為大法弟子肩負的就是救度這世人的使命。<p>　　為了能完成好這重大的歷史使命，大法弟子就必須學好法，心中有法才能做得好，因此真修、實修就是必須的。<p>　　大法的法會就為相互提高相互學習，提升自己為目地的。為此祝你們法會圓滿成功！<p><br><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師：李洪志<br>二零二三年八月二十七日</td></tr></table></div><p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2023/8/27/jw20230827-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2023/8/27/jw20230827-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2023/8/27/jw20230827-big5.zip><font color=#0000ff>PDF文件</font></a><br></div>
