                  <div class="jingwenBody"><p style="line-height:162%">參加阿根廷法會的學員：大家好！<p>　　大法是宇宙的法，是成就生命的法，要想得到他，就必須認認真真的靜下心來不斷的學習，讀懂他，按照法的要求做人，做一個修煉的人，這才是大法弟子；煉功是修煉的輔助，兩者缺一不可。然而這麼大的法，在世上傳出也一定會有其目地的。是因為世風在敗壞，人類道德的低下給人類帶來了危險，因此大法是為了救度眾生而傳世的，所以真修弟子是有救度眾生的責任的。<br>　　珍惜吧！這是萬古不遇的！<br>　　祝法會成功！謝謝大家。<p><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師 李洪志<br>二零一六年十一月二十七日</td></tr></table></div><br></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2016/12/3/jw161129-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2016/12/3/jw161129-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2016/12/3/jw161129-big5.zip><font color=#0000ff>PDF文件</font></a></div>
