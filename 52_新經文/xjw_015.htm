                  <div class="jingwenBody"><p style="line-height:162%">參加台灣交流會的大法弟子：大家好！<p>　　大法弟子的法會是相互提高、找差距、端正修煉狀態的大好契機。修煉不是在世間得到甚麼，是生命的提升，是成就生命的未來；特別是在末後，是生命未來存留與否的選擇。世人生存的世理與世人生存的狀態不是宇宙生命的真實狀態。人世間的理成不了道，人的生存狀態也不是宇宙生命的真實狀態，得到大法是你們當人的根本目地。不要被人世渾渾的亂象所干擾。修煉如初道必成！越到最後越精進！<br>　　祝法會圓滿成功！<p><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>李洪志<br>二零一八年十一月二十四日</td></tr></table></div><p></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2018/11/24/jw181124-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2018/11/24/jw181124-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2018/11/24/jw181124-big5.zip><font color=#0000ff>PDF文件</font></a></div>
