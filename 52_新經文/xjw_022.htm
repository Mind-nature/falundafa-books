                  <div class="jingwenBody"><p style="line-height:162%">參加大紀元、新唐人交流會的大法弟子：大家好！<p>　　你們在邪惡最瘋狂時建立起來，你們在世人須要了解真相中發揮了最大的作用，你們在最艱難中走過來，你們使邪惡膽寒，你們使善良的世人看到了希望。大法弟子的事還沒結束，修好自己把媒體辦的更好，這就是大法弟子的威德。艱難中走好你們的路，很不容易，可是你們走過來了。<br>　　師父祝你們更成功，謝謝你們！<p>　　<div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師 李洪志<br>二零一九年十一月二十三日</td></tr></table></div><p></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2019/11/24/jw191124-A4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2019/11/24/jw191124-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2019/11/24/jw191124-big5.zip><font color=#0000ff>PDF文件</font></a><br></div>
