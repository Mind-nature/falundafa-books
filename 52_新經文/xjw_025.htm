                  <div class="jingwenBody"><p style="line-height:162%">參加台灣法會的大法弟子：大家好！<p>　　大法是修煉，大法弟子的修煉目地是圓滿。目前人世上已是末後之末，亂世中的亂象對社會的干擾更為強烈。雖然是正邪之爭，但是你們要守住自己不被干擾，同時更好的講真相救世人。講真相中不要把自己置身於常人中，擺放好自己的位置，才能不被捲入其中，才能做的更好。<br>　　祝你們法會圓滿成功！<p><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師 李洪志<br>二零二零年</td></tr></table></div><p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2020/12/5/jw20201205-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2020/12/5/jw20201205-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2020/12/5/jw20201205-big5.zip><font color=#0000ff>PDF文件</font></a><br></div>
