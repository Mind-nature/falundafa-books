                  <div class="jingwenBody">參加台灣法會的大法弟子：大家好！<p>　　修煉是嚴肅的，是你們在兌現誓約，是生命的更新，是再造聖者的過程。無論生命來自何方，在這歷史關鍵時刻，眾生都在選擇自己的未來。大法弟子就是要把得救的希望傳遞給人，把可救的生命帶上回歸之路。因此你們必須學好法，成為真修者才可勝任，才是兌現神聖而偉大的責任。<br>　　祝你們法會成功！<p><div align=right><table border=0 cellpadding=5 cols=1 width=80%><tr align=center><td class=jingwenBody>師 李洪志<br>二零二三年十二月九日</td></tr></table></div><p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2023/12/9/jw20231209-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2023/12/9/jw20231209-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2023/12/9/jw20231209-big5.zip><font color=#0000ff>PDF文件</font></a><br></div>
