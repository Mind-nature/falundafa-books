                  <div class="jingwenBody"><p style="line-height:162%">參加法會的大法弟子：大家好！<p>　　大法修煉與其它宗教和修煉是不同的，因為大法弟子是有使命的，是在個人走向圓滿的過程中要救度眾生的。因為世人多是天上下來為得法而轉生成人的，所以大法弟子必須承擔這個責任，這也是大法弟子的偉大，因為你們成就的是大覺！希望大家多學法，多講真相，走好每個人的修煉之路。<p><br>    <div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師  李洪志<br>二零一九年九月十五日</td></tr></table></div><p></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2019/9/15/jw190915-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2019/9/15/jw190915-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2019/9/15/jw190915-big5.zip><font color=#0000ff>PDF文件</font></a><br></div>
