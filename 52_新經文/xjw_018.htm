                  <div class="jingwenBody">參加法會的大法弟子：大家好！<p>　　跟上正法進程，打開歐洲局面。在修好自己的同時，做好救度眾生的事。<br>　　希望你們通過法會真的有所提高。找到不足，做的更好。你們是人類的希望。振作起來像北美大法弟子一樣在困難面前不退縮。別被人的框框擋住。別被邪惡嚇倒，因為歷史是為你們留下來的。<p><br><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師<br>二零一九年八月四日</td></tr></table></div><p><p><br><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2019/8/4/jw190804-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2019/8/4/jw190804-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2019/8/4/jw190804-big5.zip><font color=#0000ff>PDF文件</font></a></div>
