                  <div class="jingwenBody"><p style="line-height:162%">參加台灣法會的大法弟子：大家好！<p>　　大法修煉與歷史上的任何修煉在形式上都不同，是因為你們有大法弟子的責任──在人類關鍵的歷史時刻救度眾生的神聖使命。把真相傳給世人，看似簡單，卻關係到眾生的未來。要想做好這件事，就必須修煉好自己。<br>　　你們的法會是在修煉中互相交流，找出修煉中的不足，從而更加精進。為此，師父祝你們的法會圓滿成功，祝你們在修煉中更加精進。<p>        <br><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>李洪志<br>二零一二年十一月十八日</td></tr></table></div><br></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2012/11/18/jw20121118-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2012/11/18/jw20121118-let.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2012/11/18/jw121118-big5.zip><font color=#0000ff>PDF文件</font></a></div>
