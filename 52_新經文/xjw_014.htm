                  <div class="jingwenBody"><p style="line-height:162%">參加亞洲法會的大法弟子大家好！<p>　　最後的救度一定是在人類道德崩潰的時候。惡大於善、迫害的壓力、謊言的灌輸都會給救人帶來難度，但是大家多數做的很好。其實沒有難度也用不著大法的修煉者去救了，沒有難度當然也展現不出大法徒的威德。得救的都將成為你們未來的眾生。你們是眾生的希望！你們也是未來！<p><br><div align=right><table border=0 cellpadding=5 cols=1 width=50%><tr align=center><td class=jingwenBody>師：李洪志<br>二零一八年十月十四日</td></tr></table></div><p></p><p><hr size=1><br>簡體字A4版：　　<a href=https://package.minghui.org/jw/2018/10/14/jw181014-a4.zip><font color=#0000ff>PDF文件</font></a><br>簡體字Letter版：<a href=https://package.minghui.org/jw/2018/10/14/jw181014-letter.zip><font color=#0000ff>PDF文件</font></a><br>正體字A4版：　　<a href=https://package.minghui.org/jw/2018/10/14/jw181014-big5.zip><font color=#0000ff>PDF文件</font></a></div>
